name: Build TrollStore IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify image save bridge
        run: |
          node --version
          node Scripts/verify_image_save_bridge.js

      - name: Verify native image menu config
        run: |
          python3 Scripts/verify_native_image_menu_config.py

      - name: Verify page appearance bridge
        run: |
          node Scripts/verify_page_appearance_bridge.js

      - name: Verify native surface config
        run: |
          python3 Scripts/verify_native_surface_config.py

      - name: Verify native performance config
        run: |
          python3 Scripts/verify_native_performance_config.py

      - name: Verify network error messages
        run: |
          python3 Scripts/verify_network_error_messages.py

      - name: Install tools
        run: |
          brew update
          brew install xcodegen ldid

      - name: Build and package IPA
        run: |
          chmod +x Scripts/build_ipa_macos.sh
          Scripts/build_ipa_macos.sh

      - name: Verify packaged IPA
        run: |
          python3 Scripts/verify_packaged_ipa.py build/GPTNative.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GPTNative-ipa
          path: build/GPTNative.ipa
